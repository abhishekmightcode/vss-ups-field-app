    const logEl = document.getElementById("log");
    const btn = document.getElementById("btn");

    function addLog(msg, type="") {
      const cls = type ? ` class="${type}"` : "";
      logEl.innerHTML += `<span${cls}>${msg}</span>\n`;
    }

    async function run() {
      btn.disabled = true;
      btn.textContent = "Working...";

      try {
        addLog("🔑 Signing in anonymously...");
        await firebase.auth().signInAnonymously();
        addLog("✅ Signed in\n", "ok");

        // Step 1: Count existing
        addLog("📋 Fetching existing docs...");
        const snap = await db.collection("ups_dealers").get();
        addLog(`Found ${snap.size} existing docs — deleting all...\n`);

        // Step 2: Delete in batches of 10
        const BATCH = 10;
        let deleted = 0;
        for (let i = 0; i < snap.size; i += BATCH) {
          const batch = db.batch();
          snap.docs.slice(i, i + BATCH).forEach(d => batch.delete(d.ref));
          await batch.commit();
          deleted += Math.min(BATCH, snap.size - i);
          addLog(`  Deleted ${deleted}/${snap.size}...`);
        }
        addLog(`\n✅ Deleted all ${deleted} old docs\n`, "ok");

        // Step 3: Seed 80 clean records
        addLog(`🌱 Seeding 80 clean dealers...`);
        let seeded = 0;
        for (let i = 0; i < DEALERS.length; i += BATCH) {
          const batch = db.batch();
          DEALERS.slice(i, i + BATCH).forEach(d => {
            const ref = db.collection("ups_dealers").doc(d.id);
            batch.set(ref, {
              id: d.id,
              code: d.id,
              name: d.name,
              phone: d.phone,
              source: "csv_master",
              last_synced: firebase.firestore.FieldValue.serverTimestamp()
            });
          });
          await batch.commit();
          seeded += Math.min(BATCH, DEALERS.length - i);
          addLog(`  Seeded ${seeded}/80...`);
        }

        addLog(`\n🎉 DONE! 80 clean records in Firebase.`, "ok");
        addLog("✅ Zoho CRM also updated — 64 codes added + 15 new created.", "ok");
        addLog("\n📱 App: https://abhishekmightcode.github.io/vss-ups-field-app/", "ok");
        btn.textContent = "✅ DONE";
      } catch (err) {
        addLog(`\n❌ ERROR: ${err.message}`, "err");
        btn.disabled = false;
        btn.textContent = "Retry";
      }
