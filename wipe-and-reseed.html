    const logEl = document.getElementById("log");
    const btn = document.getElementById("btn");

    function addLog(msg, type="") {
      const cls = type ? ` class="${type}"` : "";
      logEl.innerHTML += `<span${cls}>${msg}</span>\n`;
    }

    function toFields(obj) {
      const out = {};
      for (const [k, v] of Object.entries(obj)) {
        if (v === null || v === undefined) out[k] = { nullValue: null };
        else if (typeof v === "string") out[k] = { stringValue: v };
        else if (typeof v === "number") out[k] = { integerValue: String(v) };
        else if (typeof v === "boolean") out[k] = { booleanValue: v };
      }
      return out;
    }

    async function fetchAllDocs() {
      const url = `${BASE}/ups_dealers?pageSize=500${API_KEY ? '&key=' + API_KEY : ''}`;
      const res = await fetch(url);
      const data = await res.json();
      return (data.documents || []).map(d => ({
        name: d.name,
        id: d.name.split('/').pop()
      }));
    }

    async function deleteDocs(docNames) {
      if (docNames.length === 0) return;
      // CORRECT: delete is a STRING (the doc path), not an object
      const payload = JSON.stringify({
        writes: docNames.map(name => ({ delete: name }))
      });
      const res = await fetch(`${BASE}:commit?key=${API_KEY}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: payload
      });
      return res.json();
    }

    async function seedDocs(dealers) {
      if (dealers.length === 0) return;
      // CORRECT: update.name uses full path WITHOUT /v1 prefix
      const writes = dealers.map(d => {
        const docName = `projects/${PROJECT_ID}/databases/(default)/documents/ups_dealers/${d.id}`;
        return {
          update: {
            name: docName,
            fields: toFields({
              id: d.id,
              code: d.id,
              name: d.name,
              phone: d.phone || null,
              source: "csv_master",
              last_synced: new Date().toISOString()
            })
          },
          currentDocument: { exists: false }
        };
      });
      const payload = JSON.stringify({ writes });
      const res = await fetch(`${BASE}:commit?key=${API_KEY}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: payload
      });
      return res.json();
    }

    async function run() {
      btn.disabled = true;
      btn.textContent = "Working...";

      try {
        // Step 1: Fetch all existing docs
        addLog("📋 Fetching all existing docs...");
        const docs = await fetchAllDocs();
        addLog(`Found ${docs.length} existing docs\n`);

        // Step 2: Delete in batches of 10
        const BATCH = 10;
        let deleted = 0;
        for (let i = 0; i < docs.length; i += BATCH) {
          const batch = docs.slice(i, i + BATCH);
          const names = batch.map(d => d.name);
          await deleteDocs(names);
          deleted += batch.length;
          addLog(`  Deleted ${deleted}/${docs.length}...`);
        }
        addLog(`\n✅ Deleted all ${deleted} old docs\n`, "ok");

        // Step 3: Seed 80 clean records in batches of 10
        addLog(`🌱 Seeding 80 clean dealers...`);
        let seeded = 0;
        for (let i = 0; i < DEALERS.length; i += BATCH) {
          const batch = DEALERS.slice(i, i + BATCH);
          await seedDocs(batch);
          seeded += batch.length;
          addLog(`  Seeded ${seeded}/80...`);
        }

        addLog(`\n🎉 DONE! 80 clean records in Firebase.`, "ok");
        addLog("✅ Zoho CRM also already updated with all codes.", "ok");
        addLog("\n📱 App: https://abhishekmightcode.github.io/vss-ups-field-app/", "ok");
        btn.textContent = "✅ DONE";
      } catch (err) {
        addLog(`\n❌ ERROR: ${err.message}`, "err");
        btn.disabled = false;
        btn.textContent = "Retry";
      }
