    async function seed() {
      const log = document.getElementById("log");
      const status = document.getElementById("status");

      // Sign in anonymously first
      status.textContent = "Signing in...";
      await firebase.auth().signInAnonymously();
      status.textContent = `Signed in as: ${firebase.auth().currentUser.uid}`;

      const batchSize = 10;
      let success = 0;
      let failed = 0;

      for (let i = 0; i < DEALERS.length; i++) {
        const d = DEALERS[i];
        const docRef = db.collection("ups_dealers").doc(d.id);

        try {
          await docRef.set({
            ...d,
            last_synced: firebase.firestore.FieldValue.serverTimestamp(),
            source: "zoho_crm_seeded",
          }, { merge: true });

          success++;
          log.textContent = `✓ ${success}/${DEALERS.length}: ${d.name}`;
        } catch (err) {
          failed++;
          log.textContent = `✕ Failed: ${d.name} — ${err.message}`;
        }

        // Small delay to avoid rate limits
        if (i % batchSize === 0) await new Promise(r => setTimeout(r, 500));
      }

      status.textContent = `Done! ${success} seeded, ${failed} failed`;
      log.textContent = "Seeding complete!";
    }

    seed().catch(err => {
      document.getElementById("status").textContent = "Error: " + err.message;
